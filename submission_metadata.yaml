# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"        
  - "Gemini"
  - "Antigravity IDE"

ai_usage_summary: |
  Used Claude Opus (Free Tier) and Gemini Pro strictly as architectural sounding boards and to optimize Python/Polars streaming logic for the offline data pipelines. All heuristic rules, domain penalties, and retrieval logic were engineered with the help of Antigravity IDE. No candidate data was fed to any hosted LLM during the final ranking execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A decoupled Retriever-Reranker pipeline engineered for strict CPU/RAM constraints. 
  Offline Phase: A streaming Polars filter explicitly penalized keyword stuffers, job-hoppers, and out-of-domain (Speech/CV) candidates, while rewarding OSS contributors. A Bi-Encoder (BGE-Large) localized the Top 2,000 candidates, which were then fed into a Cross-Encoder (MS-MARCO) for deep semantic re-ranking. 
  Online Phase: The sandboxed rank.py fuses the mathematical heuristics with the semantic scores using Polars, and deterministically synthesizes factual reasoning using candidate data to bypass network restrictions. Runtime < 5 seconds.

